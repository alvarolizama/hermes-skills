<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PocketBrain</title>
<script src="https://unpkg.com/vis-network@9.1.6/dist/vis-network.min.js"></script>
<style>
:root{--ink:#000;--canvas:#fff;--soft:#fafafa;--hairline:#e5e5e5;--body:#737373;--mute:#a3a3a3;--red:#e74c3c;--green:#4CAF50;--orange:#FF9800;--pink:#E91E63;--purple:#9C27B0;--cyan:#00BCD4;--yellow:#FFC107}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--canvas);color:var(--ink);font-family:ui-sans-serif,system-ui,-apple-system,sans-serif;display:flex;height:100vh;overflow:hidden}
#sidebar{width:240px;min-width:240px;background:var(--canvas);border-right:1px solid var(--hairline);display:flex;flex-direction:column;z-index:10;padding:16px}
#sidebar h2{font-family:SF Pro Rounded,system-ui,sans-serif;font-size:18px;font-weight:600;margin-bottom:8px}
#brain-selector{width:100%;padding:6px 10px;border:1px solid var(--hairline);border-radius:9999px;font-size:12px;background:var(--canvas);color:var(--body);margin-bottom:8px}
#search{width:100%;padding:8px 14px;border:1px solid var(--hairline);border-radius:9999px;background:var(--soft);color:var(--ink);font-size:13px;margin-bottom:12px;outline:none}
#search:focus{background:var(--canvas);border-color:var(--ink)}
#nav{flex:1;overflow-y:auto;font-size:13px}
#nav a.nav-link{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;color:var(--body);text-decoration:none;border-radius:6px;cursor:pointer;font-size:13px}
#nav a.nav-link:hover,#nav a.nav-link.active{color:var(--ink);background:var(--soft)}
#nav a.nav-link .nav-label{display:flex;align-items:center;gap:6px;flex:1}
#nav a.nav-link .nav-count{font-size:10px;color:var(--body);background:var(--hairline);padding:1px 6px;border-radius:9999px;min-width:20px;text-align:center;flex-shrink:0}
#nav a.nav-link.active .nav-count{color:var(--ink);background:var(--canvas)}
#nav .group{color:var(--mute);font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:12px 4px 4px}
#status{font-size:10px;color:var(--mute);padding:8px 4px;border-top:1px solid var(--hairline);display:flex;align-items:center;gap:6px}
#status .dot{width:6px;height:6px;border-radius:50%;display:inline-block;background:var(--mute)}
#status.live .dot{background:var(--green)}
#status.offline .dot{background:#EF5350}
#status.live{color:var(--green)}
#status.offline{color:#EF5350}
#toasts{position:fixed;bottom:16px;right:16px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{pointer-events:auto;background:var(--ink);color:var(--canvas);padding:12px 16px;border-radius:12px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.15);opacity:0;transform:translateY(8px);transition:all .3s ease;max-width:280px;cursor:pointer}
.toast.show{opacity:1;transform:translateY(0)}
.toast.info{background:var(--ink)}
.toast.success{background:var(--green)}
.toast.error{background:#EF5350}
.toast strong{display:block;font-size:12px;margin-bottom:2px;opacity:.7}

#main{flex:1;overflow-y:auto}
#main>div{display:none;padding:20px 30px;max-width:none}
#main>div.active{display:block}
#view-graph.active{display:flex;flex-direction:column;position:relative;max-width:none;padding:0;height:100%}
#graph-view{position:absolute;top:0;left:0;right:0;bottom:0;min-height:400px}
#graph-legend{position:absolute;bottom:12px;right:12px;background:var(--canvas);border:1px solid var(--hairline);padding:8px 12px;border-radius:12px;font-size:11px;display:flex;gap:12px;flex-wrap:wrap}
#graph-legend span{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.view-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px}
.view-header h1{font-family:SF Pro Rounded,system-ui,sans-serif;font-size:30px;font-weight:500;margin:0}
.view-header select{padding:6px 12px;border:1px solid var(--hairline);border-radius:9999px;font-size:13px;background:var(--canvas);color:var(--body)}
h2{font-family:SF Pro Rounded,system-ui,sans-serif;font-size:20px;font-weight:600;margin:28px 0 10px}
h3{font-size:16px;font-weight:500;margin:16px 0 6px}
p,li{line-height:1.6;margin-bottom:6px;font-size:15px;color:var(--body)}
.wl{color:var(--ink);text-decoration:underline;cursor:pointer}
.bl{color:var(--red);text-decoration:line-through;cursor:help}
.meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;font-size:12px;color:var(--mute)}
.meta span{background:var(--soft);padding:2px 8px;border-radius:9999px}
.project-tabs{display:flex;gap:0;border-bottom:2px solid var(--hairline);margin-bottom:24px;overflow-x:auto}
.project-tabs a{display:inline-block;padding:10px 18px;font-size:13px;color:var(--mute);text-decoration:none;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;cursor:pointer}
.project-tabs a:hover{color:var(--ink)}
.project-tabs a.active{color:var(--ink);border-bottom-color:var(--ink);font-weight:600}

.meta .tag{background:var(--ink);color:var(--canvas);font-size:11px}
.card{background:var(--canvas);border:1px solid var(--hairline);border-radius:12px;padding:20px;margin-bottom:12px}
.md-content h2{margin-top:24px;padding-bottom:6px;border-bottom:3px solid var(--hairline);font-size:20px}
.md-content h3{margin-top:16px;font-size:16px}
.md-content p{line-height:1.7;margin-bottom:10px}
.md-content ul{padding-left:20px;margin-bottom:12px}
.md-content li{margin-bottom:6px}
blockquote{font-style:italic;color:var(--mute);border-left:3px solid var(--mute);padding-left:12px;margin:8px 0}
#project-tab-content{display:flex;flex-direction:column;flex:1;min-height:0}
.chip{display:inline-block;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:500;margin-right:4px}
.chip-goal{background:#E8F5E9;color:var(--green)}.chip-milestone{background:#FFF3E0;color:var(--orange)}.chip-okr{background:#FCE4EC;color:var(--pink)}
.kanban{display:flex;gap:8px;padding-bottom:20px}
.kanban-col{flex:1 1 0;min-width:140px;background:var(--soft);border-radius:12px;padding:12px}
.kanban-col h3{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;color:var(--mute)}
.kanban-card{background:var(--canvas);border:1px solid var(--hairline);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:13px}
.kanban-card .meta2{font-size:10px;color:var(--mute);margin-top:4px}
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:100;background:var(--canvas);border:1px solid var(--hairline);color:var(--ink);font-size:20px;padding:6px 10px;border-radius:9999px;cursor:pointer}
.mobile-title{display:none;position:fixed;top:16px;left:56px;z-index:100;font-family:SF Pro Rounded,system-ui,sans-serif;font-size:16px;font-weight:600}
.reminder-overdue .card{border-color:var(--red)}.reminder-section{margin:20px 0}.reminder-section h2{margin-bottom:8px;font-size:16px}
.journal-nav{display:flex;gap:8px;align-items:center}.journal-nav select{padding:6px 12px;border:1px solid var(--hairline);border-radius:9999px;font-size:13px;background:var(--canvas);color:var(--body)}
.journal-day{margin:20px 0}.journal-day h2{border-bottom:1px solid var(--hairline);padding-bottom:4px;margin-bottom:8px;font-size:15px}
.backlink-section{margin-top:32px;padding-top:16px;border-top:1px solid var(--hairline)}
.backlink-section h3{font-size:13px;color:var(--mute)}
.backlink-section a{display:inline-block;margin:2px 8px 2px 0;font-size:12px}
.wiki-layout-page{display:flex;gap:24px;align-items:flex-start}
.wiki-left{flex:1;min-width:0}
.wiki-right{width:240px;min-width:240px;flex-shrink:0}
.wiki-relations-card{background:var(--soft);border:1px solid var(--hairline);border-radius:12px;padding:16px;margin-bottom:12px}
.wiki-relations-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.wiki-relation-row{display:flex;flex-direction:column;gap:8px}
.wiki-relation-item{display:flex;align-items:center;gap:8px;font-size:13px}
.wiki-rel-icon{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:6px;font-size:11px;font-weight:600;flex-shrink:0}
.wiki-rel-label{color:var(--body);flex:1}
.wiki-contested{border-left:3px solid #E53935;padding-left:5px}
.wiki-rel-value{color:var(--ink);font-weight:500}
.index-item:hover{border-color:var(--accent)}
.conf-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;vertical-align:middle}
.conf-high{background:#E8F5E9;color:#2E7D32}
.conf-medium{background:#FFF8E1;color:#F57F17}
.conf-low{background:#FFEBEE;color:#C62828}
.pm{text-decoration:none;color:var(--accent);font-size:10px;cursor:pointer}
.pm-broken{color:#E53935;cursor:help}
.wiki-log{margin-top:32px;border-top:1px solid var(--hairline);padding-top:16px;font-size:13px}
.wiki-log h2{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:12px}
.wiki-log h2:first-child{margin-top:0}
.wiki-log div{padding:6px 0;border-bottom:1px solid var(--hairline);color:var(--body)}
.wiki-log strong{color:var(--ink)}
@media(max-width:768px){
.wiki-layout-page{flex-direction:column}
.wiki-right{width:100%;min-width:0}
}
@media(max-width:768px){
.hamburger{display:block}
.mobile-title{display:block}
#sidebar{position:fixed;top:0;left:0;bottom:0;z-index:99;transform:translateX(-100%);transition:transform .3s;box-shadow:2px 0 12px rgba(0,0,0,.1)}
#sidebar.open{transform:translateX(0)}
#main{margin-left:0}
#main>div{padding:12px;padding-top:56px;max-width:100%!important}
.kanban{flex-wrap:wrap}.kanban-col{flex:1 1 140px;min-width:140px}
.card{padding:16px;margin-bottom:8px}
.project-tabs a{padding:8px 12px;font-size:12px}
h1{font-size:24px!important}h2{font-size:18px!important}
}
</style>
</head>
<body>
<button class="hamburger" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/></svg></button>
<div id="sidebar">
  <select id="brain-selector" onchange="switchBrain(this.value)"><option>Cargando...</option></select>
  <input type="text" id="search" placeholder="Buscar..." oninput="filterSidebar()">
  <div id="nav"></div>
  <div id="status"><span class="dot"></span>cargando...</div>
</div>
<div id="main">
  <div id="view-todos"></div>
  <div id="view-goals"></div>
  <div id="view-journal"></div>
  <div id="view-reminders"></div>
  <div id="view-files"></div>
  <div id="view-deliverables"></div>
  <div id="view-wiki"></div>
  <div id="view-projects"></div>
  <div id="view-graph"><div id="graph-view"></div><div id="graph-legend"></div></div>
  <div id="view-lint" class="view"></div>
</div>
<script>

function icon(name, size){size=size||20;return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="'+(_ICONS[name]||'')+'"/></svg>';}

function api(path){var c=currentContext||'personal';var sep=path.indexOf('?')>-1?'&':'?';return fetch('/api'+path+sep+'context='+c).then(function(r){return r.json();});}

var _pbConfig=null,_hbTimer=null,_hbFail=0,_lastSnap={pages:0,goals:0,todos:0,deps:0,files:0,reminders:0,journal:0};
function updateStatus(state){var el=document.getElementById('status');if(!el)return;el.className=state==='live'?'live':(state==='offline'?'offline':'');el.innerHTML='<span class="dot"></span>'+(state==='live'?'live':(state==='offline'?'offline':'cargando...'));}
function loadPbConfig(){api('/config').then(function(cfg){_pbConfig=cfg;updateStatus('live');startHeartbeat();}).catch(function(err){console.error('config error',err);updateStatus('offline');});}
function startHeartbeat(){if(_hbTimer)clearInterval(_hbTimer);_hbTimer=setInterval(function(){if(!_pbConfig)return;fetch(_pbConfig.pb_url+'/api/health',{cache:'no-store'}).then(function(r){if(r.ok){_hbFail=0;updateStatus('live');}else{throw new Error('bad health');}}).catch(function(){_hbFail++;if(_hbFail>=2)updateStatus('offline');});},10000);}
function checkDiff(now){var msgs=[];if(now[0].length!==_lastSnap.pages)msgs.push('Páginas');if(now[1].length!==_lastSnap.goals)msgs.push('Goals');if(now[2].length!==_lastSnap.todos)msgs.push('Tareas');if(now[3].length!==_lastSnap.deps)msgs.push('Entregables');if(now[4].length!==_lastSnap.files)msgs.push('Archivos');if(now[5].length!==_lastSnap.reminders)msgs.push('Reminders');if(now[6]&&now[6].length!==_lastSnap.journal)msgs.push('Journal');if(msgs.length)showToast(msgs.join(', '),'info');}
function saveSnap(now){_lastSnap={pages:now[0].length,goals:now[1].length,todos:now[2].length,deps:now[3].length,files:now[4].length,reminders:now[5].length,journal:(now[6]||[]).length};}
function showToast(msg,type){var container=document.getElementById('toasts');if(!container)return;while(container.children.length>=3){container.removeChild(container.firstChild);}var t=document.createElement('div');t.className='toast '+(type||'info');t.innerHTML='<strong>'+(type==='success'?'Creado':type==='error'?'Eliminado':'Actualizado')+'</strong>'+msg;container.appendChild(t);requestAnimationFrame(function(){t.classList.add('show');});setTimeout(function(){t.classList.remove('show');setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t);},300);},5000);}

function loadBrains(){api('/contexts').then(function(brains){var sel=document.getElementById('brain-selector');sel.innerHTML=brains.map(function(b){var s=b.name===currentContext?' selected':'';return'<option value="'+b.name+'"'+s+'>'+b.name+'</option>';}).join('');currentContext=sel.value||brains[0]?.name||'personal';loadAll();});}

function switchBrain(name){currentContext=name;_graphInit=false;PAGES=[];GOALS=[];TODOS=[];DEPS=[];FILES=[];REMINDERS=[];JOURNAL=[];loadAll();}

var _firstLoad=true;

function showCurrentView(){
  document.querySelectorAll('#main>div').forEach(function(d){d.classList.remove('active');});
  document.querySelectorAll('#nav a.nav-link').forEach(function(a){a.classList.remove('active');});
  if(_currentTab==='project'&&_currentProject){renderProjectView(_currentProject);return;}
  var views={projects:'view-projects',todos:'view-todos',goals:'view-goals',journal:'view-journal',reminders:'view-reminders',files:'view-files',deliverables:'view-deliverables',wiki:'view-wiki',graph:'view-graph',lint:'view-lint'};
  var vid=views[_currentTab];if(!vid)return;
  document.getElementById(vid).classList.add('active');
  var sel='a.nav-link[onclick*="showTab(' + "'" + _currentTab + "'" + ')"]';
  try{document.querySelector(sel).classList.add('active');}catch(e){}
  if(_currentTab==='projects')renderProjectsView();
  if(_currentTab==='todos')renderTodosView();
  else if(_currentTab==='goals')renderGoalsView();
  else if(_currentTab==='journal')renderJournalView();
  else if(_currentTab==='reminders')renderRemindersView();
  else if(_currentTab==='files')renderFiles();
  else if(_currentTab==='deliverables')renderDeliverables();
  else if(_currentTab==='wiki'){if(window._wikiSlug){showPage(window._wikiSlug);}else{showIndex();}}
  else if(_currentTab==='graph'){document.getElementById('view-graph').classList.add('active');setTimeout(renderGraph,300);}
  else if(_currentTab==='lint')renderLintView();
  document.getElementById('view-'+_currentTab).scrollTop=0;
}

function setGoalFilter(v){_goalFilter=v;renderGoalsView();}
function renderGoalsView(){
  var filtered=GOALS;
  if(_goalFilter==='noproject')filtered=GOALS.filter(function(g){return !g.page_slug;});
  else if(_goalFilter)filtered=GOALS.filter(function(g){return g.page_slug===_goalFilter;});
  var cAll=filtered.filter(function(g){return !g.parent;}).length;
  var cActive=filtered.filter(function(g){return !g.parent&&(g.status==='active'||g.status==='planned');}).length;
  var cCompleted=filtered.filter(function(g){return !g.parent&&g.status==='completed';}).length;
  var cCancelled=filtered.filter(function(g){return !g.parent&&g.status==='cancelled';}).length;
  if(_goalStatusFilter==='active')filtered=filtered.filter(function(g){return g.status==='active'||g.status==='planned';});
  else if(_goalStatusFilter==='completed')filtered=filtered.filter(function(g){return g.status==='completed';});
  else if(_goalStatusFilter==='cancelled')filtered=filtered.filter(function(g){return g.status==='cancelled';});
  var parents=filtered.filter(function(g){return !g.parent;});
  var h='<div class="project-tabs" style="margin-bottom:12px"><a href="#" onclick="event.preventDefault();_goalStatusFilter=\'all\';renderGoalsView();return false;" class="'+(_goalStatusFilter==='all'?'active':'')+'">Todos ('+cAll+')</a><a href="#" onclick="event.preventDefault();_goalStatusFilter=\'active\';renderGoalsView();return false;" class="'+(_goalStatusFilter==='active'?'active':'')+'">Activos ('+cActive+')</a><a href="#" onclick="event.preventDefault();_goalStatusFilter=\'completed\';renderGoalsView();return false;" class="'+(_goalStatusFilter==='completed'?'active':'')+'">Terminados ('+cCompleted+')</a><a href="#" onclick="event.preventDefault();_goalStatusFilter=\'cancelled\';renderGoalsView();return false;" class="'+(_goalStatusFilter==='cancelled'?'active':'')+'">Cancelados ('+cCancelled+')</a></div>';
  h+='<div class="view-header"><h1>Goals</h1><select onchange="setGoalFilter(this.value)" style="padding:6px 12px;border:1px solid var(--hairline);border-radius:9999px;font-size:13px;background:var(--canvas);color:var(--body)"><option value=""'+(_goalFilter===''?' selected':'')+'>Todos</option><option value="noproject"'+(_goalFilter==='noproject'?' selected':'')+'>Sin proyecto</option>';
  PAGES.filter(function(p){return p.page_type==='project';}).forEach(function(p){h+='<option value="'+p.slug+'"'+(_goalFilter===p.slug?' selected':'')+'>'+p.title+'</option>';});
  h+='</select></div><p style="color:var(--mute);margin-bottom:20px">'+parents.length+' goals</p>';

    h+='</div>';
  });
  document.getElementById('view-goals').innerHTML=h||'<p style="color:var(--mute)">No hay goals.</p>';

function setReminderFilter(v){_reminderFilter=v;renderRemindersView();}

function setFileFilter(v){_fileFilter=v;renderFiles();}

function renderRemindersView(){
  var filtered=REMINDERS;
  if(_reminderFilter==='noproject')filtered=REMINDERS.filter(function(r){return !r.page_slug;});
  else if(_reminderFilter)filtered=REMINDERS.filter(function(r){return r.page_slug===_reminderFilter;});
  var now=new Date();var today=now.toISOString().slice(0,10);
  var overdue=filtered.filter(function(r){return !r.done&&r.date<today;}).sort(function(a,b){return a.date.localeCompare(b.date);});
  var todayItems=filtered.filter(function(r){return !r.done&&r.date===today;}).sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
  var thisWeek=[];var future=[];
  var weekEnd=new Date(now);weekEnd.setDate(now.getDate()+(7-now.getDay()));
  var weStr=weekEnd.toISOString().slice(0,10);
  filtered.filter(function(r){return !r.done&&r.date>today;}).forEach(function(r){
    if(r.date<=weStr)thisWeek.push(r);else future.push(r);
  });
  thisWeek.sort(function(a,b){return a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'');});
  future.sort(function(a,b){return a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||'');});
  var done=filtered.filter(function(r){return r.done;}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var h='<div class="project-tabs" style="margin-bottom:12px">'
  +'<a href="#" onclick="event.preventDefault();_reminderStatusTab=\'today\';renderRemindersView();return false;" class="'+(_reminderStatusTab==='today'?'active':'')+'">Hoy ('+todayItems.length+')</a>'
  +'<a href="#" onclick="event.preventDefault();_reminderStatusTab=\'week\';renderRemindersView();return false;" class="'+(_reminderStatusTab==='week'?'active':'')+'">Esta semana ('+thisWeek.length+')</a>'
  +'<a href="#" onclick="event.preventDefault();_reminderStatusTab=\'future\';renderRemindersView();return false;" class="'+(_reminderStatusTab==='future'?'active':'')+'">Próximos ('+future.length+')</a>'
  +'<a href="#" onclick="event.preventDefault();_reminderStatusTab=\'overdue\';renderRemindersView();return false;" class="'+(_reminderStatusTab==='overdue'?'active':'')+'">Atrasados ('+overdue.length+')</a>'
  +'<a href="#" onclick="event.preventDefault();_reminderStatusTab=\'done\';renderRemindersView();return false;" class="'+(_reminderStatusTab==='done'?'active':'')+'">Completados ('+done.length+')</a>'
  +'<a href="#" onclick="event.preventDefault();_reminderStatusTab=\'all\';renderRemindersView();return false;" class="'+(_reminderStatusTab==='all'?'active':'')+'">Todos ('+filtered.length+')</a>'
  +'</div>';
  h+='<div class="view-header"><h1>'+icon('bell',16)+' Reminders</h1><select onchange="setReminderFilter(this.value)" style="padding:6px 12px;border:1px solid var(--hairline);border-radius:9999px;font-size:13px;background:var(--canvas);color:var(--body)"><option value=""'+(_reminderFilter===''?' selected':'')+'>Todos</option><option value="noproject"'+(_reminderFilter==='noproject'?' selected':'')+'>Sin proyecto</option>';
  PAGES.filter(function(p){return p.page_type==='project';}).forEach(function(p){h+='<option value="'+p.slug+'"'+(_reminderFilter===p.slug?' selected':'')+'>'+p.title+'</option>';});
  h+='</select></div>';
  var activeSet;
  if(_reminderStatusTab==='today')activeSet=todayItems;
  else if(_reminderStatusTab==='week')activeSet=thisWeek;
  else if(_reminderStatusTab==='future')activeSet=future;
  else if(_reminderStatusTab==='overdue')activeSet=overdue;
  else if(_reminderStatusTab==='done')activeSet=done;
  else activeSet=filtered;
  if(!activeSet.length)h+='<p style="color:var(--mute)">No hay recordatorios en esta sección.</p>';
  else activeSet.forEach(function(r){
    h+='<div class="card"'+(r.done?' style="opacity:0.5"':'')+' style="margin-bottom:8px"><h3>'+(r.done?'<s>':'')+r.title+(r.done?'</s>':'')+'</h3><div class="meta2" style="font-size:12px;color:var(--mute);margin-top:4px">'+r.date+(r.time?' · '+r.time:'')+(r.page_title?' · '+r.page_title:'')+'</div>'+(r.content?'<p style="font-size:13px;color:var(--body);margin-top:4px">'+r.content+'</p>':'')+'</div>';
  });
  document.getElementById('view-reminders').innerHTML=h||'<p style="color:var(--mute)">No hay recordatorios.</p>';
}

function refreshLint() {

    h += '<table style="width:100%;border-collapse:collapse;border:1px solid var(--hairline)"><tr style="background:var(--hairline)"><th style="padding:6px 12px;text-align:left">Issue</th><th style="padding:6px 12px;text-align:right">Cantidad</th></tr>';

    Object.keys(issues).forEach(function(k){

      h += '<tr><td style="padding:4px 12px">' + issues[k] + '</td><td style="padding:4px 12px;text-align:right;font-weight:' + (c > 0 ? '700' : '400') + '">' + c + '</td></tr>';
    });

    if (data.broken_links && data.broken_links.length) { h += '<h3 style="margin-top:16px">Links rotos (' + data.broken_links.length + ')</h3>'; data.broken_links.forEach(function(b){h += '<div class="card" style="padding:6px 12px;margin-bottom:4px"><strong>' + b.page + '</strong> \u2192 ' + b.link + '</div>';}); }
    if (data.low_confidence && data.low_confidence.length) { h += '<h3 style="margin-top:16px">Confianza baja (' + data.low_confidence.length + ')</h3>'; data.low_confidence.forEach(function(s){h += '<div class="card" style="cursor:pointer;padding:6px 12px;margin-bottom:4px" onclick="showPage(\\\'' + s + '\\\')">' + s + '</div>';}); }
    if (data.contested_pages && data.contested_pages.length) { h += '<h3 style="margin-top:16px">Contested (' + data.contested_pages.length + ')</h3>'; data.contested_pages.forEach(function(s){h += '<div class="card" style="cursor:pointer;padding:6px 12px;margin-bottom:4px" onclick="showPage(\\\'' + s + '\\\')">' + s + '</div>';}); }
    if (data.oversized_pages && data.oversized_pages.length) { h += '<h3 style="margin-top:16px">P\u00e1ginas grandes (' + data.oversized_pages.length + ')</h3>'; data.oversized_pages.forEach(function(s){h += '<div class="card" style="cursor:pointer;padding:6px 12px;margin-bottom:4px" onclick="showPage(\\\'' + s + '\\\')">' + s + '</div>';}); }
    el.innerHTML = h;
  }).catch(function(e){ el.innerHTML = '<p style="color:#E53935">Error: ' + e.message + '</p>'; });
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');}

function mdToHtml(text){
  if(!text)return'';var lines=text.split('\n'),out=[],ic=false,ul=false,ol=false;
  function rl(tx){
    tx=tx.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>\$1</em></strong>');
    tx=tx.replace(/\*\*(.+?)\*\*/g,'<strong>\$1</strong>');
    tx=tx.replace(/\*(?!\*)(.+?)\*/g,'<em>\$1</em>');
    tx=tx.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="\$2" target="_blank" class="wl">\$1</a>');
    return tx.replace(/\[\[([^\]]+)\]\]/g,function(_,target){
      var alias=target;if(target.indexOf('|')>-1){var parts=target.split('|');target=parts[0].trim();alias=parts[1].trim();}
      target=target.trim();alias=alias.trim();
      if(pmap[target])return'<a href="\#" class="wl" onclick="showPage(\''+target+'\')">'+alias+'</a>';
      return'<span class="bl" title="'+target+'">'+alias+'</span>';
    }).replace(/\^\[([^\]]+)\]/g,function(_,slug){
      slug=slug.trim().toLowerCase().replace(/ /g,'-');
      if(pmap[slug])return' <sup><a href="#" onclick="showPage(\''+slug+'\');return false" class="pm" title="'+slug+'">['+slug.substring(0,12)+']</a></sup>';
      return' <sup><span class="pm pm-broken" title="'+slug+'">[?]</span></sup>';
    });
  }
  function closeList(){if(ul){out.push('</ul>');ul=false;}if(ol){out.push('</ol>');ol=false;}}
  lines.forEach(function(line){
    var tl=line.trim();
    if(tl.startsWith('```')){closeList();ic=!ic;out.push(ic?'<pre>':'</pre>');return;}
    if(ic){out.push(esc(line));return;}
    if(!tl){closeList();out.push('');return;}
    var m=tl.match(/^[-\*]\s+(.+)$/);
    if(m){if(!ul){out.push('<ul>');ul=true;}out.push('<li>'+rl(m[1])+'</li>');return;}
    m=tl.match(/^\d+\.\s+(.+)$/);
    if(m){if(!ol){out.push('<ol>');ol=true;}out.push('<li>'+rl(m[1])+'</li>');return;}
    closeList();
    m=line.match(/^(#{1,6})\s+(.+)$/);
    if(m){out.push('<h'+m[1].length+'>'+rl(m[2])+'</h'+m[1].length+'>');return;}
    if(tl.startsWith('>')){out.push('<blockquote>'+rl(tl.substring(1).trim())+'</blockquote>');return;}
    out.push('<p>'+rl(esc(line))+'</p>');
  });
  closeList();
  return out.join('\n');
}

    var pgoals=GOALS.filter(function(g){return g.page===p.slug;}).length;
    var ptodos=TODOS.filter(function(t){return t.page_slug===p.slug;}).length;
    var statusBadge=p.status&&p.status!=='active'?' <span style="font-size:11px;color:var(--mute);background:var(--soft);padding:1px 8px;border-radius:9999px;margin-left:6px">'+p.status+'</span>':'';

  var vp=document.getElementById('view-todos');vp.classList.add('active');
  var pgoals=GOALS.filter(function(g){return g.page===slug;});
  var ptodos=TODOS.filter(function(t){return t.page_slug===slug;});
  var pdeps=DEPS.filter(function(d){return d.page_slug===slug;});
  var prems=REMINDERS.filter(function(r){return r.page_slug===slug;});
  var pjour=JOURNAL.filter(function(j){return j.page_slug===slug;});
  var pfiles=FILES.filter(function(f){return f.page_slug===slug;});
  var h='<div class="project-tabs"><a href="\#" onclick="switchProjectTab(\'content\',\''+slug+'\'); return false;">Contenido ('+(p.body?1:0)+')</a><a href="\#" onclick="switchProjectTab(\'goals\',\''+slug+'\'); return false;">Goals ('+pgoals.length+')</a><a href="\#" onclick="switchProjectTab(\'kanban\',\''+slug+'\'); return false;">Kanban ('+ptodos.length+')</a><a href="\#" onclick="switchProjectTab(\'reminders\',\''+slug+'\'); return false;">Recordatorios ('+prems.length+')</a><a href="\#" onclick="switchProjectTab(\'journal\',\''+slug+'\'); return false;">Journal ('+pjour.length+')</a><a href="\#" onclick="switchProjectTab(\'files\',\''+slug+'\'); return false;">Archivos ('+pfiles.length+')</a><a href="\#" onclick="switchProjectTab(\'deliverables\',\''+slug+'\'); return false;">Entregables ('+pdeps.length+')</a><a href="\#" onclick="switchProjectTab(\'graph\',\''+slug+'\'); return false;">Graph ('+(1+pgoals.length+ptodos.length+prems.length)+')</a></div>';
  h+='<div style="font-size:12px;color:var(--mute);margin-bottom:12px;display:flex;align-items:center;gap:8px"><a href="\#" onclick="showTab(\'projects\')" style="color:var(--ink);display:flex;align-items:center;gap:4px">'+icon('arrow-left',16)+' Proyectos</a></div><h1 style="margin-bottom:20px">'+p.title+'</h1>';
  h+='<div id="project-tab-content"></div>';
  vp.innerHTML=h;vp.scrollTop=0;
  window._projectData={slug:slug,goals:pgoals,todos:ptodos,rems:prems,jour:pjour,files:pfiles,deps:pdeps,p:p};
  switchProjectTab('content',slug);
}

// ── Graph ─────────────────────────────────────────────────
var _graphInit=false;

function renderFiles(){
  var filtered=FILES;
  if(_fileFilter==='noproject')filtered=FILES.filter(function(f){return !f.page_slug;});
  else if(_fileFilter)filtered=FILES.filter(function(f){return f.page_slug===_fileFilter;});
  var h='<div class="view-header"><h1>Files</h1><select onchange="setFileFilter(this.value)" style="padding:6px 12px;border:1px solid var(--hairline);border-radius:9999px;font-size:13px;background:var(--canvas);color:var(--body)"><option value=""'+(_fileFilter===''?' selected':'')+'>Todos</option><option value="noproject"'+(_fileFilter==='noproject'?' selected':'')+'>Sin proyecto</option>';
  PAGES.filter(function(p){return p.page_type==='project';}).forEach(function(p){h+='<option value="'+p.slug+'"'+(_fileFilter===p.slug?' selected':'')+'>'+p.title+'</option>';});
  h+='</select></div><p style="color:var(--mute);margin-bottom:16px">'+filtered.length+' archivos</p>';
  if(!filtered.length)h+='<p>No hay archivos.</p>';
  else filtered.forEach(function(f){h+='<div class="card"><h3>'+f.name+'</h3><div style="font-size:12px;color:var(--mute)">'+(f.file_type||'otro')+(f.page_title?' · '+f.page_title:'')+'</div></div>';});
  document.getElementById('view-files').innerHTML=h;
}
function renderDeliverables(){
  var filtered=DEPS;
  if(_depFilter==='noproject')filtered=DEPS.filter(function(d){return !d.page_slug;});
  else if(_depFilter)filtered=DEPS.filter(function(d){return d.page_slug===_depFilter;});
  var h='<div class="view-header"><h1>Deliverables</h1><select onchange="setDepFilter(this.value)" style="padding:6px 12px;border:1px solid var(--hairline);border-radius:9999px;font-size:13px;background:var(--canvas);color:var(--body)"><option value=""'+(_depFilter===''?' selected':'')+'>Todos</option><option value="noproject"'+(_depFilter==='noproject'?' selected':'')+'>Sin proyecto</option>';
  PAGES.filter(function(p){return p.page_type==='project';}).forEach(function(p){h+='<option value="'+p.slug+'"'+(_depFilter===p.slug?' selected':'')+'>'+p.title+'</option>';});
  h+='</select></div><p style="color:var(--mute);margin-bottom:16px">'+filtered.length+' entregables</p>';
  if(!filtered.length)h+='<p>No hay entregables.</p>';
  else filtered.forEach(function(d){h+='<div class="card"><h3>'+d.title+' <span class="chip" style="background:var(--soft);color:var(--mute)">'+d.status+'</span></h3><div style="font-size:12px;color:var(--mute)">'+(d.version?'v'+d.version:'')+(d.page_title?' · '+d.page_title:'')+'</div></div>';});
  document.getElementById('view-deliverables').innerHTML=h;
}
function renderGraph(){
  if(_graphInit){if(window._net)window._net.fit();return;}_graphInit=true;
  var GCOLORS={entity:'#4CAF50',concept:'#2196F3',comparison:'#FF9800',query:'#9C27B0',raw:'#607D8B',project:'#E91E63',goal:'#4CAF50',milestone:'#FF9800',okr:'#E91E63',todo:'#9C27B0',deliverable:'#00BCD4',reminder:'#FFC107'};
  var GTYPE_NAMES={entity:'Entidades',concept:'Conceptos',comparison:'Comparaciones',query:'Consultas',raw:'Raw',project:'Proyectos',goal:'Goals',milestone:'Hitos',okr:'OKRs',todo:'Todo',deliverable:'Entregables',reminder:'Reminders'};
  var lh='';var counts=(GRAPH.counts||{});
  for(var group in counts){var color=GCOLORS[group]||'#888';var label=GTYPE_NAMES[group]||group;lh+='<div><span style="background:'+color+'"></span> '+label+' ('+counts[group]+')</div>';}
  document.getElementById('graph-legend').innerHTML=lh;
  var nodes=new vis.DataSet(GRAPH.nodes.map(function(n){return{id:n.id,label:n.label,color:{background:n.color,border:'#333'},font:{color:'#333',size:11},shape:'dot',size:18};}));
  var edges=new vis.DataSet(GRAPH.edges.map(function(e){return{from:e.from,to:e.to,color:{color:'#ccc',opacity:0.6},arrows:{to:{enabled:true,scaleFactor:0.5}}};}));
  window._net=new vis.Network(document.getElementById('graph-view'),{nodes:nodes,edges:edges},{physics:{forceAtlas2Based:{gravitationalConstant:-50,centralGravity:0.01,springLength:150,springConstant:0.08},maxVelocity:50,solver:'forceAtlas2Based',timestep:0.35,stabilization:{iterations:150}},interaction:{hover:true,zoomView:true,dragView:true},edges:{smooth:{type:'continuous'}}});
  if(window._net){window._net.once('afterDrawing',function(){window._net.fit();});window._net.fit();}
}


function renderProjectGraph(d){
  var colors={goal:'#4CAF50',milestone:'#FF9800',okr:'#E91E63',todo:'#9C27B0',concept:'#2196F3',entity:'#4CAF50',project:'#E91E63',reminder:'#FFC107',deliverable:'#00BCD4',file:'#607D8B',journal:'#795548'};
  var nodes=[{id:'project',label:d.p.title,color:{background:'#E91E63',border:'#333'},font:{color:'#333',size:14},shape:'dot',size:25}];
  var edges=[];
  d.goals.forEach(function(g,i){
    var nid='goal_'+i;
    nodes.push({id:nid,label:g.title,color:{background:colors[g.type]||'#4CAF50',border:'#333'},font:{color:'#333',size:11},shape:'dot',size:16});
    edges.push({from:'project',to:nid,color:{color:'#ccc',opacity:0.6}});
  });
  d.todos.forEach(function(t,i){
    var nid='todo_'+i;
    nodes.push({id:nid,label:t.title,color:{background:colors.todo,border:'#333'},font:{color:'#333',size:10},shape:'dot',size:14});
    edges.push({from:'project',to:nid,color:{color:'#ddd',opacity:0.4}});
  });
  d.rems.forEach(function(r,i){
    var nid='rem_'+i;
    nodes.push({id:nid,label:r.title,color:{background:colors.reminder,border:'#333'},font:{color:'#333',size:10},shape:'dot',size:14});
    edges.push({from:'project',to:nid,color:{color:'#ddd',opacity:0.4}});
  });
  var nds=new vis.DataSet(nodes);
  var eds=new vis.DataSet(edges);
  var container=document.getElementById('project-graph-view');
  var pnet=new vis.Network(container,{nodes:nds,edges:eds},{physics:{barnesHut:{gravitationalConstant:-2000,centralGravity:0.3,springLength:120,springConstant:0.04},maxVelocity:50,solver:'barnesHut',stabilization:{iterations:100}},interaction:{hover:true,zoomView:true,dragView:true},edges:{smooth:{type:'continuous'}}});
  if(pnet)pnet.fit();
  var ptypes=[];
  if(d.goals.length)ptypes.push({label:'Goals',count:d.goals.length,color:'#4CAF50'});
  if(d.todos.length)ptypes.push({label:'Tareas',count:d.todos.length,color:'#9C27B0'});
  if(d.rems.length)ptypes.push({label:'Reminders',count:d.rems.length,color:'#FFC107'});
  ptypes.push({label:'Proyecto',count:1,color:'#E91E63'});
  // Page types from wikilinks in project body
  var ptCounts={};
  if(d.p&&d.p.body){
    var links=(d.p.body.match(/\[\[([^\]]+)\]\]/g)||[]).map(function(l){return l.replace(/[\[\]]/g,'').split('|')[0].trim();});
    links.forEach(function(slug){
      var pp=pmap[slug];
      if(pp){var t=pp.page_type||'concept';ptCounts[t]=(ptCounts[t]||0)+1;}
    });
  }
  var ptLabels={entity:'Entidades',concept:'Conceptos',comparison:'Comparaciones',query:'Consultas',raw:'Raw'};
  var ptColors={entity:'#4CAF50',concept:'#2196F3',comparison:'#FF9800',query:'#9C27B0',raw:'#607D8B'};
  Object.keys(ptLabels).forEach(function(t){if(ptCounts[t])ptypes.push({label:ptLabels[t],count:ptCounts[t],color:ptColors[t]});});
  var plh='<div style="display:flex;gap:12px;flex-wrap:wrap;font-size:11px;margin-top:8px;">';
  ptypes.forEach(function(pt){plh+='<div><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+pt.color+';margin-right:4px;"></span>'+pt.label+' ('+pt.count+')</div>';});
  plh+='</div>';
  var lgc=document.getElementById('project-graph-legend');if(lgc)lgc.innerHTML=plh;
}
